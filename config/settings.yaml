# JIRA Configuration
jira:
  url: "${JIRA_URL}"  # https://company.atlassian.net
  username: "${JIRA_USERNAME}"
  password: "${JIRA_PASSWORD}"
  project_key: "${JIRA_PROJECT_KEY}"  # Set via UI or env var
  board_id: 1  # Change to your board ID

# AI Configuration
ai:
  provider: "github"  # "github", "openai" or "azure"
  model: "gpt-4o"
  api_key: "${OPENAI_API_KEY}"
  temperature: 0.3
  max_tokens: 20000

# GitHub Models Configuration (recommended - uses GitHub token)
github:
  token: "${GITHUB_TOKEN}"
  model: "gpt-4o"  # Available: gpt-4o, gpt-4o-mini, o1, o1-mini, etc.

# Azure OpenAI Configuration (if using Azure)
azure:
  endpoint: "${AZURE_OPENAI_ENDPOINT}"
  api_key: "${AZURE_OPENAI_KEY}"
  deployment_name: "gpt-4"
  api_version: "2024-02-15-preview"

# Web Server Configuration
web:
  host: "0.0.0.0"
  port: 5000
  debug: false

# Feature Flags
features:
  enable_charts: true
  enable_context: true
  max_results: 100
