<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIRA Assistant</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <span class="sidebar-logo-text">JIRA Assistant</span>
                </div>
                <button id="sidebarToggle" class="icon-btn sidebar-toggle" title="Ẩn sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                </button>
            </div>
            <div class="sidebar-new-chat">
                <button id="clearBtn" class="new-chat-btn" title="Cuộc trò chuyện mới">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span>New chat</span>
                </button>
                <a href="/github-loc" class="new-chat-btn" title="GitHub LOC Report" style="text-decoration:none; margin-top:4px; border-style:solid; border-color:var(--sidebar-border);">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
                    <span>GitHub LOC Report</span>
                </a>
            </div>
            <div class="sidebar-history" id="sidebarHistory">
                <div class="history-section-label">Recents</div>
                <!-- Chat history items rendered by JS -->
            </div>

            <!-- Sidebar Bottom: Login & Project -->
            <div class="sidebar-bottom" id="sidebarBottom">
                <!-- AI Provider -->
                <div id="aiKeyPanel" class="login-panel" style="border-bottom: 1px solid var(--sidebar-border); padding-bottom: 10px; margin-bottom: 10px;">
                    <div class="login-title">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
                        <span>AI Provider</span>
                    </div>
                    <div id="aiKeyForm">
                        <select id="aiProviderSelect" class="sidebar-input sidebar-select">
                            <option value="github">GitHub Models</option>
                            <option value="openai">OpenAI</option>
                            <option value="azure">Azure OpenAI</option>
                        </select>
                        <input type="password" id="aiKeyInput" class="sidebar-input" placeholder="API Key" autocomplete="off" style="margin-top:6px;" />
                        <button id="aiKeyBtn" class="login-btn" style="margin-top:6px;">Xác thực</button>
                        <div id="aiKeyStatus" class="login-error hidden"></div>
                    </div>
                    <div id="aiAuthInfo" class="user-info hidden" style="margin-top:6px;">
                        <div class="user-info-left">
                            <div class="user-avatar-sm" id="aiAuthAvatar" style="background:var(--success-color,#4caf50);color:#fff;font-size:11px;">AI</div>
                            <span class="user-name-text" id="aiAuthName">Authenticated</span>
                        </div>
                        <button id="aiLogoutBtn" class="logout-btn" title="Đăng xuất AI">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Logged-out state: Login form -->
                <div id="loginPanel" class="login-panel">
                    <div class="login-title">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                        <span>Đăng nhập JIRA</span>
                    </div>
                    <input type="text" id="loginUrl" class="sidebar-input" placeholder="JIRA URL (https://...)" autocomplete="url" />
                    <input type="text" id="loginUsername" class="sidebar-input" placeholder="Username / Email" autocomplete="username" />
                    <input type="password" id="loginPassword" class="sidebar-input" placeholder="Password / API Token" autocomplete="current-password" />
                    <select id="loginProjectKey" class="sidebar-input sidebar-select" disabled>
                        <option value="">-- Đăng nhập để chọn Project --</option>
                    </select>
                    <button id="loginBtn" class="login-btn">Đăng nhập</button>
                    <div id="loginError" class="login-error hidden"></div>
                </div>

                <!-- Logged-in state: User info + Project selector -->
                <div id="userPanel" class="user-panel hidden">
                    <div class="project-selector">
                        <label class="project-label">Project</label>
                        <select id="projectKeyInput" class="sidebar-input sidebar-select">
                        </select>
                    </div>
                    <div class="user-info">
                        <div class="user-info-left">
                            <div class="user-avatar-sm" id="userAvatarText">U</div>
                            <span class="user-name-text" id="userNameText">user</span>
                        </div>
                        <button id="logoutBtn" class="logout-btn" title="Đăng xuất">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main -->
        <div class="main">
            <!-- Top bar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button id="sidebarOpen" class="icon-btn sidebar-open-btn hidden" title="Mở sidebar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                    </button>
                    <span class="model-selector">JIRA Assistant</span>
                </div>
            </header>

            <!-- Chat scroll area -->
            <div class="chat-scroll" id="chatScroll">
                <!-- Welcome -->
                <div id="welcomeMessage" class="welcome">
                    <div class="welcome-inner">
                        <div class="welcome-logo">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
                                <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor" opacity="0.85"/>
                                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <h1>Tôi có thể giúp gì cho bạn?</h1>
                        <div class="suggestions" id="suggestions"></div>
                    </div>
                </div>

                <!-- Messages -->
                <div id="messagesContainer" class="messages"></div>

                <!-- Loading -->
                <div id="loadingIndicator" class="loading hidden">
                    <div class="loading-row">
                        <div class="assistant-icon-sm">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" opacity="0.85"><path d="M12 2L2 7L12 12L22 7L12 2Z"/><path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" fill="none"/><path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                        </div>
                        <div class="loading-dots">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input area -->
            <div class="input-area">
                <div class="input-box" id="inputBox">
                    <!-- Output mode selector -->
                    <div class="mode-selector" id="modeSelector">
                        <button class="mode-btn" id="modeBtn" type="button" title="Chọn chế độ output">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                        <div class="mode-menu hidden" id="modeMenu">
                            <button class="mode-option active" data-mode="auto">
                                <span class="mode-option-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a4 4 0 0 1 4 4c0 1.95-1.4 3.58-3.25 3.93L12 10v2"/><circle cx="12" cy="16" r="1"/><circle cx="12" cy="12" r="10"/></svg>
                                </span>
                                <span class="mode-option-text">
                                    <span class="mode-option-name">Auto</span>
                                    <span class="mode-option-desc">Tự động theo câu hỏi</span>
                                </span>
                            </button>
                            <button class="mode-option" data-mode="chart">
                                <span class="mode-option-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
                                </span>
                                <span class="mode-option-text">
                                    <span class="mode-option-name">Chart</span>
                                    <span class="mode-option-desc">Xuất dạng biểu đồ</span>
                                </span>
                            </button>
                            <button class="mode-option" data-mode="report">
                                <span class="mode-option-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                                </span>
                                <span class="mode-option-text">
                                    <span class="mode-option-name">Report</span>
                                    <span class="mode-option-desc">Thống kê dạng bảng</span>
                                </span>
                            </button>
                        </div>
                    </div>
                    <textarea 
                        id="messageInput" 
                        placeholder="Nhắn cho JIRA Assistant..." 
                        rows="1"
                        maxlength="2000"
                    ></textarea>
                    <div class="input-actions">
                        <div class="model-dropdown" id="modelDropdown">
                            <button class="model-dropdown-btn" id="modelDropdownBtn" type="button" title="Chọn model">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
                                <span id="modelName">GPT-4o</span>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                            </button>
                            <div class="model-dropdown-menu hidden" id="modelMenu">
                                <!-- Models rendered by JS -->
                            </div>
                        </div>
                        <button id="sendBtn" class="send-btn" disabled title="Gửi">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                        </button>
                    </div>
                </div>
                <div class="input-mode-indicator hidden" id="modeIndicator">
                    <span class="mode-chip" id="modeChip">
                        <span class="mode-chip-icon" id="modeChipIcon"></span>
                        <span class="mode-chip-label" id="modeChipLabel">Auto</span>
                        <button class="mode-chip-close" id="modeChipClose" title="Chuyển về Auto">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </span>
                </div>
                <p class="disclaimer">JIRA Assistant có thể mắc sai sót. Hãy kiểm tra các thông tin quan trọng.</p>
            </div>
        </div>
    </div>

    <!-- Chart Modal -->
    <div id="chartModal" class="modal hidden">
        <div class="modal-overlay" onclick="closeChartModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="chartTitle">Biểu đồ</h3>
                <button class="icon-btn" onclick="closeChartModal()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <canvas id="modalChart"></canvas>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
