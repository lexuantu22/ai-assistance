name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # Check if directory exists, if not clone it
            if [ ! -d "/opt/ai-assistance" ]; then
              echo "Directory does not exist. Cloning repository..."
              mkdir -p /opt/ai-assistance
              git clone https://github.com/lexuantu22/ai-assistance.git /opt/ai-assistance
            fi
            
            # Navigate to the application directory
            cd /opt/ai-assistance
            
            # Pull latest changes from the main branch
            git pull origin main
            
            # Ensure .env file exists
            if [ ! -f "/opt/ai-assistance/.env" ]; then
              echo "Creating .env from .env.example..."
              cp /opt/ai-assistance/.env.example /opt/ai-assistance/.env
            fi
            
            # Restart the docker containers with the new build
            # The --build flag ensures the new frontend/backend code is rebuilt into the containers
            # The -d flag runs them in the background
            docker-compose up -d --build
            
            # Optional: Clean up dangling images to save disk space
            docker image prune -f
