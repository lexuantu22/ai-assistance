name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Prepare VPS Git Repository
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            if [ ! -d "/opt/ai-assistance/.git" ]; then
              echo "Directory does not exist or is not a git repo. Cloning repository..."
              rm -rf /opt/ai-assistance
              mkdir -p /opt/ai-assistance
              git clone https://github.com/lexuantu22/ai-assistance.git /opt/ai-assistance
            fi
            
            cd /opt/ai-assistance
            git pull origin main
            
            if [ ! -f "/opt/ai-assistance/.env" ]; then
              echo "Creating .env from .env.example..."
              cp /opt/ai-assistance/.env.example /opt/ai-assistance/.env
            fi

      - name: Copy built assets to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "frontend/dist"
          target: "/opt/ai-assistance"

      - name: Restart Docker Containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/ai-assistance
            docker system prune -f
            docker-compose up -d --build
