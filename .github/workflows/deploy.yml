name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}-api:latest
          provenance: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Prepare VPS Git Repository
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            if [ ! -d "/opt/ai-assistance/.git" ]; then
              echo "Directory does not exist or is not a git repo. Cloning repository..."
              rm -rf /opt/ai-assistance
              mkdir -p /opt/ai-assistance
              git clone https://github.com/lexuantu22/ai-assistance.git /opt/ai-assistance
            fi
            
            cd /opt/ai-assistance
            git pull origin main
            
            if [ ! -f "/opt/ai-assistance/.env" ]; then
              echo "Creating .env from .env.example..."
              cp /opt/ai-assistance/.env.example /opt/ai-assistance/.env
            fi

      - name: Copy built assets to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "frontend/dist"
          target: "/opt/ai-assistance"

      - name: Restart Docker Containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # Authenticate Docker on VPS with GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            cd /opt/ai-assistance
            # Aggressively clean up all unused images, containers, and networks to free up space
            docker system prune -a -f
            docker-compose pull api
            docker-compose up -d --build
            
            # Wait a few seconds for the API to try to start
            sleep 5
            
            # Print the logs of the API container to help debug the 502 Bad Gateway error
            echo "--- API CONTAINER LOGS ---"
            docker-compose logs --tail=100 api
